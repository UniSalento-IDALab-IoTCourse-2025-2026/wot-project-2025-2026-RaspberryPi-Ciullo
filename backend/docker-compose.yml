version: '3.8'

services:
  mosquitto:
    image: eclipse-mosquitto:2
    container_name: smartcare-mosquitto
    ports:
      - "1883:1883"
      - "9001:9001"
    volumes:
      - ./mosquitto/config:/mosquitto/config
      - ./mosquitto/data:/mosquitto/data
      - ./mosquitto/log:/mosquitto/log
    restart: unless-stopped

  mongodb:
    image: mongo:7
    container_name: smartcare-mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: smartcare
    restart: unless-stopped

volumes:
  mongodb_data: